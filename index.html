import React from 'react';

import htm from 'htm';

// ─── File System Access API ───

const FS_DB_NAME = 'devmanager_fs';
const FS_STORE = 'handles';
const STATE_DIR = '.devmanager';
const STATE_FILENAME = 'state.json';

function openFsDb() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(FS_DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(FS_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveDirHandle(handle) {
  const db = await openFsDb();
  const tx = db.transaction(FS_STORE, 'readwrite');
  tx.objectStore(FS_STORE).put(handle, 'projectDir');
  return new Promise(r => { tx.oncomplete = r; });
}

async function loadDirHandle() {
  const db = await openFsDb();
  const tx = db.transaction(FS_STORE, 'readonly');
  const req = tx.objectStore(FS_STORE).get('projectDir');
  return new Promise(r => { req.onsuccess = () => r(req.result || null); });
}

async function clearDirHandle() {
  const db = await openFsDb();
  const tx = db.transaction(FS_STORE, 'readwrite');
  tx.objectStore(FS_STORE).delete('projectDir');
}

async function verifyHandle(handle) {
  if (!handle) return false;
  try {
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    return perm === 'granted';
  } catch { return false; }
}

async function requestAccess(handle) {
  if (!handle) return false;
  try {
    const perm = await handle.requestPermission({ mode: 'readwrite' });
    return perm === 'granted';
  } catch { return false; }
}

async function ensureDevManagerDir(projectHandle) {
  return await projectHandle.getDirectoryHandle(STATE_DIR, { create: true });
}

async function ensureOrchestratorSkill(projectHandle) {
  try {
    // Check if .claude/skills/orchestrator/SKILL.md already exists
    const claude = await projectHandle.getDirectoryHandle('.claude', { create: true });
    const skills = await claude.getDirectoryHandle('skills', { create: true });
    const orch = await skills.getDirectoryHandle('orchestrator', { create: true });
    try {
      await orch.getFileHandle('SKILL.md');
      return; // already exists, don't overwrite
    } catch {}
    // Create it
    const fileHandle = await orch.getFileHandle('SKILL.md', { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(ORCHESTRATOR_SKILL_TEMPLATE);
    await writable.close();
  } catch { /* permission issues, skip silently */ }
}

async function writeState(projectHandle, data) {
  try {
    const dir = await ensureDevManagerDir(projectHandle);
    const fileHandle = await dir.getFileHandle(STATE_FILENAME, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
    return true;
  } catch { return false; }
}

async function readState(projectHandle) {
  try {
    const dir = await projectHandle.getDirectoryHandle(STATE_DIR);
    const fileHandle = await dir.getFileHandle(STATE_FILENAME);
    const file = await fileHandle.getFile();
    const text = await file.text();
    return { data: JSON.parse(text), lastModified: file.lastModified };
  } catch {
    return null;
  }
}

const ORCHESTRATOR_SKILL_TEMPLATE = `---
name: orchestrator
description: "Tech lead that reads the Dev Manager queue, plans work, delegates to sub-agents, reviews results, and reports back. TRIGGER on: orchestrator, what's next, plan work, project status, execute queue."
---

# Orchestrator — Tech Lead

You are the tech lead for this project. The manager creates tasks and queues work in the Dev Manager (browser). You read the queue, decide the technical approach, delegate implementation to sub-agents, review their output, and report back.

**You do NOT do implementation yourself.** You delegate to sub-agents via the Agent tool and review their work.

## State file: \`.devmanager/state.json\`

All project state. Dev Manager writes to it, you read and write back. Dev Manager polls every 3s.

---

## \`/orchestrator next\` (primary command)

### 1. Read the queue
Read \`.devmanager/state.json\`. Pick first item from \`queue\`.

If empty: check \`drafts\`. If drafts exist, list them. Otherwise: "Nothing queued. Add tasks in Dev Manager."

### 2. Understand the task

**Existing task** \`{ "task": N, "taskName": "...", "notes": "..." }\`:
- Read spec at \`specs/tasks/{NN}-*.md\` if it exists
- Read \`notes\` — manager's instructions (HIGH PRIORITY)

**Draft task** \`{ "action": "promote-and-execute", "cardId": "...", "taskName": "...", "description": "...", "notes": "..." }\`:
- Promote first: assign next ID, create spec file, add to \`tasks\` array
- Then proceed as existing task

### 3. Plan the approach

Use an Explore agent to understand the codebase context:

\`\`\`
Agent(subagent_type="Explore", prompt="Find all files related to [feature]. I need to understand [what].")
\`\`\`

Based on the exploration, decide:
- What files need to change
- What's the technical approach
- Are there risks or dependencies

Present a brief plan to the user. Example:
\`\`\`
## Google login

Manager says: "Frontend code exists. Needs Google provider config + reliability hardening."

**Approach:** 3 changes
1. Add loading state to AuthPage during OAuth redirect
2. Handle OAuth error params in URL after redirect
3. Add user-friendly error messages

**Ready to delegate. Approve?**
\`\`\`

**STOP HERE.** Wait for the user to approve the plan. Do NOT launch sub-agents until the user says go. They may want to adjust the approach, add constraints, or change priorities.

### 4. Delegate to sub-agent (only after approval)

Launch an implementation agent:

\`\`\`
Agent(
  subagent_type="general-purpose",
  prompt="[detailed implementation instructions with file paths, approach, and constraints]"
)
\`\`\`

The prompt to the sub-agent should include:
- What to implement (from spec + manager notes)
- Which files to modify (from your exploration)
- Technical constraints (from CLAUDE.md, project conventions)
- What NOT to do (avoid over-engineering, follow existing patterns)
- Run \`npm run build\` (or equivalent) to verify

### 5. Review the result

When the sub-agent returns:
- Check if it completed all requirements
- If it ran the build successfully
- If anything looks wrong, either fix it yourself or launch another agent

### 6. Report back

Update \`.devmanager/state.json\`:
- Remove executed item from \`queue\`
- Update task in \`tasks\` array: \`status: "done"\`, \`completedAt: "YYYY-MM-DD"\`
- Remove promoted draft from \`drafts\` if applicable
- Add to \`activity\`: \`{ "id": "act_{timestamp}", "time": {ms}, "label": "{taskName} completed" }\`
- Add to \`sessions\`: \`{ "id": "sess_{timestamp}", "timestamp": "ISO", "taskName": "...", "status": "completed", "summary": "..." }\`

Then check if there are more items in the queue. If yes, ask: "Next up: {taskName}. Continue?"

---

## \`/orchestrator status\`

Read \`.devmanager/state.json\` + \`git log --oneline -10\`.

Output a brief status:
- Pending tasks (from \`tasks\` where status != "done")
- Queued items count
- Shipped features (from \`features\`)
- Recent git activity

---

## \`/orchestrator task N\`

Same as \`next\` but for a specific task. Read manager notes, explore codebase, present plan, delegate, review, report.

---

## Sub-agent patterns

### Explore (read-only research)
\`\`\`
Agent(subagent_type="Explore", prompt="...", description="Find auth files")
\`\`\`
Use for: understanding codebase, finding files, checking patterns before delegating.

### Implementation (code changes)
\`\`\`
Agent(subagent_type="general-purpose", prompt="...", description="Implement Google OAuth")
\`\`\`
Use for: actual code changes. Give detailed instructions. Always include "run build/tests to verify."

### Multiple parallel agents
When tasks have independent parts, launch agents in parallel:
\`\`\`
Agent(description="Add loading state", prompt="...")
Agent(description="Handle OAuth errors", prompt="...")
\`\`\`

---

## Spec file format (for promoted drafts)

\`\`\`markdown
# Task {N}: {title}

> {description from manager}

## Manager notes
{notes — highest priority instructions}

## Approach
[Tech lead fills this after codebase exploration]

## Files to modify
- [identified files]
\`\`\`

---

## Key principles

1. **Manager notes override everything.** If the manager says "skip X, focus on Y" — do that.
2. **Delegate, don't implement.** Use sub-agents for code changes. You plan and review.
3. **Always write back.** Update state.json after every operation so Dev Manager stays in sync.
4. **Always wait for approval.** Present the plan, then STOP. Never launch sub-agents without explicit user go-ahead.
5. **Keep it simple.** Don't over-engineer. Follow existing project patterns.
`;

function createDefaultState(projectName) {
  return {
    savedAt: new Date().toISOString(),
    project: projectName,
    tasks: [],
    features: [],
    drafts: [],
    queue: [],
    taskNotes: {},
    draftNotes: {},
    activity: [{ id: 'act_init', time: Date.now(), label: 'Project initialized' }],
    sessions: [],
  };
}

// ─── useProject hook ───

function useProject() {
  const [dirHandle, setDirHandle] = useState(null);
  const [connected, setConnected] = useState(false);
  const [status, setStatus] = useState('disconnected'); // disconnected | connecting | connected | synced | error
  const [projectName, setProjectName] = useState('');
  const [data, setData] = useState(null);
  const [lastProjectName, setLastProjectName] = useState(() => {
    try { return localStorage.getItem('dm_last_project') || ''; } catch { return ''; }
  });

  const saveTimer = useRef(null);
  const lastWriteTime = useRef(0);
  const pollTimer = useRef(null);
  const dataRef = useRef(null);

  // Keep dataRef in sync
  useEffect(() => { dataRef.current = data; }, [data]);

  // On mount: try to restore saved handle (but don't auto-connect -- need user gesture for permission)
  useEffect(() => {
    (async () => {
      const handle = await loadDirHandle();
      if (handle && await verifyHandle(handle)) {
        // Permission already granted, auto-connect
        await connectWithHandle(handle);
      }
    })();
  }, []);

  const connectWithHandle = useCallback(async (handle) => {
    setStatus('connecting');
    const name = handle.name;
    setProjectName(name);
    setLastProjectName(name);
    try { localStorage.setItem('dm_last_project', name); } catch {}

    // Try reading existing state
    const existing = await readState(handle);
    let stateData;
    if (existing) {
      stateData = existing.data;
      lastWriteTime.current = existing.lastModified;
    } else {
      // Create fresh state
      stateData = createDefaultState(name);
      await writeState(handle, stateData);
      lastWriteTime.current = Date.now();
    }

    // Use project name from state if available
    if (stateData.project) setProjectName(stateData.project);

    // Ensure orchestrator skill exists in the project
    await ensureOrchestratorSkill(handle);

    await saveDirHandle(handle);
    setDirHandle(handle);
    setData(stateData);
    setConnected(true);
    setStatus('connected');
  }, []);

  const connect = useCallback(async () => {
    setStatus('connecting');

    // Try restoring saved handle first
    let handle = await loadDirHandle();
    if (handle) {
      if (await verifyHandle(handle) || await requestAccess(handle)) {
        await connectWithHandle(handle);
        return;
      }
    }

    // Pick new directory
    if (!window.showDirectoryPicker) {
      setStatus('error');
      return;
    }
    try {
      handle = await window.showDirectoryPicker({ mode: 'readwrite' });
      await connectWithHandle(handle);
    } catch (e) {
      if (e.name !== 'AbortError') setStatus('error');
      else setStatus('disconnected');
    }
  }, [connectWithHandle]);

  const reconnect = useCallback(async () => {
    const handle = await loadDirHandle();
    if (handle) {
      if (await requestAccess(handle)) {
        await connectWithHandle(handle);
        return;
      }
    }
    // If handle doesn't work, fall back to picker
    await connect();
  }, [connect, connectWithHandle]);

  const disconnect = useCallback(() => {
    clearTimeout(saveTimer.current);
    clearInterval(pollTimer.current);
    setDirHandle(null);
    setConnected(false);
    setData(null);
    setProjectName('');
    setStatus('disconnected');
    clearDirHandle();
  }, []);

  // Save function (debounced)
  const save = useCallback((newData) => {
    const updated = { ...newData, savedAt: new Date().toISOString() };
    setData(updated);
    if (!dirHandle) return;

    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      const ok = await writeState(dirHandle, updated);
      if (ok) lastWriteTime.current = Date.now();
      setStatus(ok ? 'connected' : 'error');
    }, 500);
  }, [dirHandle]);

  // Poll for external changes (every 3s)
  useEffect(() => {
    if (!connected || !dirHandle) return;
    pollTimer.current = setInterval(async () => {
      const result = await readState(dirHandle);
      if (!result) return;
      // If file was modified after our last write, it's an external change
      if (result.lastModified > lastWriteTime.current + 1000) {
        lastWriteTime.current = result.lastModified;
        setData(result.data);
        if (result.data.project) setProjectName(result.data.project);
        setStatus('synced');
        setTimeout(() => setStatus('connected'), 2000);
      }
    }, 3000);
    return () => clearInterval(pollTimer.current);
  }, [connected, dirHandle]);

  return { connected, status, projectName, data, save, connect, reconnect, disconnect, lastProjectName };
}

// ─── Skill auto-suggest ───

const SKILL_KEYWORDS = [
  { skills: ['qa-tester'], words: ['test', 'qa', 'check ui', 'verify', 'screenshot', 'visual'] },
  { skills: ['en-ua-auditor'], words: ['translat', 'i18n', 'string', 'locali', 'uk/en', 'en/uk'] },
  { skills: ['ui-ux-design', 'frontend-design'], words: ['design', 'ui', 'ux', 'layout', 'style', 'css', 'visual', 'polish'] },
  { skills: ['senior-frontend'], words: ['component', 'page', 'react', 'hook', 'feature', 'form', 'modal', 'sidebar', 'button'] },
  { skills: ['databases', 'backend-development'], words: ['schema', 'database', 'table', 'migration', 'rls', 'sql', 'supabase'] },
  { skills: ['backend-development'], words: ['api', 'auth', 'storage', 'bucket', 'rpc', 'policy'] },
  { skills: ['video-recorder'], words: ['video', 'demo', 'record', 'playwright'] },
  { skills: ['debugging'], words: ['debug', 'fix', 'bug', 'broken', 'crash', 'error'] },
  { skills: ['refactoring-expert'], words: ['refactor', 'cleanup', 'extract', 'simplif'] },
];

function suggestSkills(text) {
  if (!text) return { skills: [], matches: [] };
  const lower = text.toLowerCase();
  const matched = new Set();
  const matchedWords = [];
  for (const { skills, words } of SKILL_KEYWORDS) {
    const hits = words.filter(w => lower.includes(w));
    if (hits.length > 0) {
      skills.forEach(s => matched.add(s));
      matchedWords.push(...hits.map(w => ({ word: w, skills })));
    }
  }
  return { skills: [...matched], matches: matchedWords };
}

function ProjectPicker({ onConnect, onReconnect, lastProjectName, status }) {
  return h`
    <div style=${{
      minHeight: '100vh', display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center', gap: '32px',
    }}>
      <div style=${{ textAlign: 'center' }}>
        <h1 style=${{ fontWeight: 700, fontSize: '28px', color: 'var(--text)', marginBottom: '8px' }}>Dev Manager</h1>
        <p style=${{ color: 'var(--text-light)', fontSize: '14px' }}>Open a project folder to get started</p>
      </div>

      <button
        onClick=${onConnect}
        disabled=${status === 'connecting'}
        style=${{
          padding: '14px 36px',
          background: 'var(--accent)',
          color: 'white',
          border: 'none',
          borderRadius: 'var(--radius)',
          fontSize: '16px',
          fontWeight: 600,
          fontFamily: 'var(--font)',
          cursor: status === 'connecting' ? 'wait' : 'pointer',
          boxShadow: 'var(--shadow-md)',
          transition: 'all 0.2s',
          opacity: status === 'connecting' ? 0.7 : 1,
        }}
        onMouseOver=${e => { if (status !== 'connecting') e.target.style.opacity = '0.9'; }}
        onMouseOut=${e => e.target.style.opacity = status === 'connecting' ? '0.7' : '1'}
      >
        ${status === 'connecting' ? 'Connecting...' : 'Open project'}
      </button>

      ${lastProjectName ? h`
        <button
          onClick=${onReconnect}
          style=${{
            background: 'none', border: 'none', cursor: 'pointer',
            color: 'var(--text-muted)', fontSize: '13px', fontFamily: 'var(--font)',
            padding: '8px 16px', borderRadius: 'var(--radius-sm)',
            transition: 'all 0.15s',
          }}
          onMouseOver=${e => { e.target.style.color = 'var(--accent)'; e.target.style.background = 'var(--accent-light)'; }}
          onMouseOut=${e => { e.target.style.color = 'var(--text-muted)'; e.target.style.background = 'none'; }}
        >
          Last opened: ${lastProjectName}
        </button>
      ` : null}

      ${status === 'error' ? h`
        <div style=${{ color: 'var(--danger)', fontSize: '13px' }}>
          Could not connect. Make sure your browser supports the File System Access API.
        </div>
      ` : null}
    </div>
  `;
}

function Header({ projectName, status, onDisconnect }) {
  const [dark, setDark] = useState(() => document.documentElement.getAttribute('data-theme') === 'dark');

  const toggleTheme = useCallback(() => {
    const next = !dark;
    setDark(next);
    if (next) {
      document.documentElement.setAttribute('data-theme', 'dark');
      localStorage.setItem('dm_theme', 'dark');
    } else {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('dm_theme', 'light');
    }
  }, [dark]);

  return h`
    <header style=${{
      background: 'var(--surface)',
      borderBottom: '1px solid var(--border)',
      padding: '14px 32px',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'space-between',
      boxShadow: 'var(--shadow-sm)',
      position: 'sticky',
      top: 0,
      zIndex: 10,
    }}>
      <div style=${{ display: 'flex', alignItems: 'center', gap: '12px' }}>
        <button
          onClick=${onDisconnect}
          title="Switch project"
          style=${{
            background: 'none', border: 'none', cursor: 'pointer',
            color: 'var(--text-light)', fontSize: '14px', fontFamily: 'var(--font)',
            padding: '2px 6px', borderRadius: '4px', transition: 'all 0.15s',
          }}
          onMouseOver=${e => { e.target.style.color = 'var(--accent)'; e.target.style.background = 'var(--accent-light)'; }}
          onMouseOut=${e => { e.target.style.color = 'var(--text-light)'; e.target.style.background = 'none'; }}
        >${'\u2190'}</button>
        <span style=${{ fontWeight: 700, fontSize: '18px', color: 'var(--text)' }}>${projectName}</span>
        <span style=${{ color: 'var(--text-light)', fontSize: '14px' }}>/</span>
        <span style=${{ fontWeight: 500, fontSize: '16px', color: 'var(--text-muted)' }}>Dev Manager</span>
      </div>
      <div style=${{ display: 'flex', alignItems: 'center', gap: '12px' }}>
        ${status === 'synced' ? h`
          <span style=${{ fontSize: '12px', color: 'var(--accent)', fontWeight: 500 }}>
            Synced from Claude!
          </span>
        ` : status === 'error' ? h`
          <span style=${{ fontSize: '11px', color: 'var(--danger)' }}>Sync error</span>
        ` : null}
        <button
          onClick=${toggleTheme}
          title=${dark ? 'Light mode' : 'Dark mode'}
          style=${{
            background: 'none', border: 'none', cursor: 'pointer',
            fontSize: '16px', padding: '4px', lineHeight: 1,
            color: 'var(--text-light)', transition: 'color 0.15s',
          }}
          onMouseOver=${e => e.target.style.color = 'var(--text)'}
          onMouseOut=${e => e.target.style.color = 'var(--text-light)'}

function CardForm({ card, onSave, onCancel }) {
  const [title, setTitle] = useState(card?.title || '');
  const [description, setDescription] = useState(card?.description || '');
  const [manualSkills, setManualSkills] = useState(card?.skills?.join(', ') || '');
  const [userEditedSkills, setUserEditedSkills] = useState(!!card?.skills?.length);

  const { skills: suggested, matches } = useMemo(() => suggestSkills(title + ' ' + description), [title, description]);
  const displaySkills = userEditedSkills ? manualSkills : suggested.join(', ');

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!title.trim()) return;
    const finalSkills = userEditedSkills
      ? manualSkills.split(',').map(s => s.trim()).filter(Boolean)
      : suggested;
    onSave({
      id: card?.id || 'card_' + Date.now(),
      title: title.trim(),
      description: description.trim(),
      skills: finalSkills,
      createdAt: card?.createdAt || new Date().toISOString(),
    });
  };

  const inputStyle = {
    width: '100%', padding: '6px 8px', fontSize: '13px', fontFamily: 'var(--font)',
    border: '1px solid var(--border)', borderRadius: '6px', background: 'var(--surface)',
    outline: 'none',
  };

  return h`
    <form onSubmit=${handleSubmit} style=${{
      background: 'var(--surface)', border: '1px solid var(--border)',
      borderRadius: 'var(--radius)', padding: '16px', marginBottom: '16px',
      boxShadow: 'var(--shadow-md)',
    }}>
      <input
        value=${title} onInput=${e => setTitle(e.target.value)}
        placeholder="Task title..." autoFocus
        style=${{ ...inputStyle, fontWeight: 600, marginBottom: '8px' }}
      />
      <textarea
        value=${description} onInput=${e => setDescription(e.target.value)}
        placeholder="Description (what needs to be done)..."
        rows="2"
        style=${{ ...inputStyle, marginBottom: '8px', resize: 'vertical' }}
      />
      <div style=${{ marginBottom: '12px' }}>
        <div style=${{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '4px' }}>
          <span style=${{ fontSize: '11px', color: 'var(--text-muted)', fontWeight: 500 }}>Skills</span>
          ${!userEditedSkills && suggested.length > 0 ? h`
            <span style=${{ fontSize: '10px', color: 'var(--accent)', fontStyle: 'italic' }}>auto-detected</span>
          ` : null}
        </div>
        <input
          value=${displaySkills}
          onInput=${e => { setManualSkills(e.target.value); setUserEditedSkills(true); }}
          onFocus=${() => { if (!userEditedSkills) { setManualSkills(suggested.join(', ')); setUserEditedSkills(true); } }}
          placeholder="Auto-detected from title, or type manually..."
          style=${{ ...inputStyle, fontSize: '12px', color: userEditedSkills ? 'var(--text)' : 'var(--accent)' }}
        />
        ${suggested.length > 0 && !userEditedSkills ? h`
          <div style=${{ marginTop: '6px' }}>
            <div style=${{ fontSize: '10px', color: 'var(--text-light)', lineHeight: 1.5 }}>
              matched: ${matches.map(m => h`
                <code key=${m.word} style=${{
                  background: 'var(--accent-light)', padding: '0 4px', borderRadius: '3px',
                  fontSize: '10px', fontFamily: 'monospace', marginRight: '3px',
                  color: 'var(--accent)',
                }}>"${m.word}"</code>
              `)}
            </div>
          </div>
        ` : null}
      </div>
      <div style=${{ display: 'flex', gap: '8px' }}>
        ${onCancel ? h`
          <button type="button" onClick=${onCancel} style=${{
            padding: '6px 12px', background: 'var(--bg)', color: 'var(--text-muted)',
            border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)', fontSize: '12px',
            fontWeight: 500, fontFamily: 'var(--font)', cursor: 'pointer',
          }}>Cancel</button>
        ` : null}
        <button type="submit" style=${{
          flex: 1, padding: '6px 12px', background: 'var(--accent)', color: 'white',
          border: 'none', borderRadius: 'var(--radius-sm)', fontSize: '12px',
          fontWeight: 600, fontFamily: 'var(--font)', cursor: 'pointer',
        }}>${card ? 'Save' : 'Add task'}</button>
      </div>
    </form>
  `;
}

  const item = task || draft;
  const isDraft = !!draft;

  useEffect(() => {

      ${task.status === 'pending' ? h`

function ActivityFeed({ sessions, activity }) {
  const entries = useMemo(() => {
    const items = [];

    for (const s of sessions) {
      if (s.status === 'completed' && s.taskName) {
        const d = new Date(s.timestamp);
        items.push({
          key: s.id,
          time: d.getTime(),
          label: s.taskName + ' completed',
          date: d.toLocaleDateString('en-GB', { month: 'short', day: 'numeric' }),
        });
      }
    }

    for (const a of activity) {
      items.push({
        key: a.id,
        time: a.time,
        label: a.label,
        date: new Date(a.time).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
      });
    }

    items.sort((a, b) => b.time - a.time);
    return items.slice(0, 12);
  }, [sessions, activity]);

  if (entries.length === 0) {
    return h`
      <div style=${{
        padding: '20px 16px', textAlign: 'center', color: 'var(--text-light)', fontSize: '12px',
      }}>
        No activity yet
      </div>
    `;
  }

  return h`
    <div style=${{ padding: '4px 0' }}>
      ${entries.map(e => h`
        <div key=${e.key} style=${{
          display: 'flex', alignItems: 'baseline', gap: '8px',
          padding: '6px 16px', fontSize: '12px',
        }}>
          <span style=${{ color: 'var(--text-light)', fontSize: '11px', flexShrink: 0, minWidth: '48px' }}>${e.date}</span>
          <span style=${{ color: 'var(--text-muted)' }}>${e.label}</span>
        </div>
      `)}
    </div>
  `;
}

  const [selectedTask, setSelectedTask] = useState(null);
  const [copiedId, setCopiedId] = useState(null);

  // If not connected, show picker
  if (!connected || !data) {
    return h`<${ProjectPicker}
      onConnect=${connect}
      onReconnect=${reconnect}
      lastProjectName=${lastProjectName}
      status=${status}
    />`;
  }

  // Convenience accessors
  const tasks = data.tasks || [];
  const features = data.features || [];
  const drafts = data.drafts || [];
  const queue = data.queue || [];
  const taskNotes = data.taskNotes || {};
  const draftNotes = data.draftNotes || {};
  const activity = data.activity || [];
  const sessions = data.sessions || [];

  // Helpers to update data and trigger save
  const updateData = (partial) => {
    const next = { ...data, ...partial };
    save(next);
  };

  const addActivity = (label) => {
    const entry = { id: 'act_' + Date.now(), time: Date.now(), label };
    const next = [entry, ...(data.activity || [])].slice(0, 20);
    return next;
  };

  // Task handlers
  const handleSelectTask = (id) => {
    setSelectedTask(prev => prev === id ? null : id);
  };

  const handleUpdateTask = (id, updates) => {
    const newTasks = tasks.map(t => t.id === id ? { ...t, ...updates } : t);
    const newActivity = addActivity((tasks.find(t => t.id === id)?.name || 'Task') + (updates.status ? ' marked ' + updates.status : ' updated'));
    updateData({ tasks: newTasks, activity: newActivity });
  };

  const handleUpdateNotes = (id, note) => {
    updateData({ taskNotes: { ...taskNotes, [id]: note } });
  };

  const handleUpdateDraftNotes = (cardId, note) => {
    updateData({ draftNotes: { ...draftNotes, [cardId]: note } });
  };

  const handleAddDraft = (card) => {
    const newDrafts = [...drafts, card];
    const newActivity = addActivity('Draft "' + card.title + '" added');
    updateData({ drafts: newDrafts, activity: newActivity });
  };

  const handleDeleteDraft = (id) => {
    const newDrafts = drafts.filter(c => c.id !== id);
    updateData({ drafts: newDrafts });
  };

  const handleQueue = (task) => {
    if (queue.some(q => q.task === task.id)) return;
    const newQueue = [...queue, {
      task: task.id,
      taskName: task.name,
      skills: task.skills,
      notes: taskNotes[task.id] || '',
    }];
    const newActivity = addActivity(task.name + ' queued');
    updateData({ queue: newQueue, activity: newActivity });
  };

  const handleQueueDraft = (card) => {
    if (queue.some(q => q.cardId === card.id)) return;
    const newQueue = [...queue, {
      action: 'promote-and-execute',
      cardId: card.id,
      taskName: card.title,
      description: card.description || '',
      skills: card.skills || [],
      notes: draftNotes[card.id] || '',
    }];
    const newActivity = addActivity(card.title + ' queued');
    updateData({ queue: newQueue, activity: newActivity });
  };

  const handleRemoveFromQueue = (key) => {
    const newQueue = queue.filter(q => (q.task || q.cardId) !== key);
    updateData({ queue: newQueue });
  };

  const handleClearQueue = () => {
    updateData({ queue: [] });
  };

  const handleCopyCommand = async () => {
    const text = '/orchestrator next';
    setCopiedId('all');
    try {
      await navigator.clipboard.writeText(text);
    } catch {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    setTimeout(() => setCopiedId(null), 2000);
  };

  // Selected task/draft data
  const selectedTaskData = typeof selectedTask === 'string' && selectedTask.startsWith('draft:')
    ? null
    : tasks.find(t => t.id === selectedTask) || null;

  const selectedDraftData = typeof selectedTask === 'string' && selectedTask.startsWith('draft:')
    ? drafts.find(c => c.id === selectedTask.slice(6)) || null
    : null;

  return h`
    <div style=${{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <${Header} projectName=${projectName} status=${status} onDisconnect=${disconnect} />

      <div style=${{ flex: 1, display: 'flex', flexDirection: 'column', maxWidth: '1200px', margin: '0 auto', width: '100%', padding: '24px 32px' }}>

        <!-- Top row: Tasks + Detail -->
        <div style=${{
          display: 'grid', gridTemplateColumns: '1fr 280px', gap: '16px', marginBottom: '16px',
        }}>
          <div style=${{
            background: 'var(--surface)', borderRadius: 'var(--radius)', border: '1px solid var(--border)',
            boxShadow: 'var(--shadow-sm)',
          }}>
            <${SectionHeader} title="Product" />
            <div style=${{ padding: '16px' }}>
              <${TaskBoard}
                tasks=${tasks}
                features=${features}
                drafts=${drafts}
                selectedTask=${selectedTask}
                onSelectTask=${handleSelectTask}
                onAddDraft=${handleAddDraft}
                onDeleteDraft=${handleDeleteDraft}
              />
            </div>
          </div>

          <div style=${{
            background: 'var(--surface)', borderRadius: 'var(--radius)', border: '1px solid var(--border)',
            boxShadow: 'var(--shadow-sm)', display: 'flex', flexDirection: 'column',
          }}>
            <${SectionHeader} title="Detail" />
            <${TaskDetail}
              task=${selectedTaskData}
              draft=${selectedDraftData}
              onQueue=${handleQueue}
              onQueueDraft=${handleQueueDraft}
              onUpdateTask=${handleUpdateTask}
              notes=${taskNotes[selectedTask] || ''}
              onUpdateNotes=${handleUpdateNotes}
              draftNotes=${selectedDraftData ? (draftNotes[selectedDraftData.id] || '') : ''}
              onUpdateDraftNotes=${handleUpdateDraftNotes}
            />
          </div>
        </div>

        <!-- Bottom row: Queue + Activity -->
        <div style=${{ display: 'grid', gridTemplateColumns: '1fr 280px', gap: '16px' }}>
          <div style=${{
            background: 'var(--surface)', borderRadius: 'var(--radius)', border: '1px solid var(--border)',
            boxShadow: 'var(--shadow-sm)',
          }}>
            <${SectionHeader} title="Queue" count=${queue.length > 0 ? queue.length : null} />
            <${CommandQueue} queue=${queue} onCopy=${handleCopyCommand} onRemove=${handleRemoveFromQueue} onClear=${handleClearQueue} copiedId=${copiedId} />
          </div>

          <div style=${{
            background: 'var(--surface)', borderRadius: 'var(--radius)', border: '1px solid var(--border)',
            boxShadow: 'var(--shadow-sm)',
          }}>
            <${SectionHeader} title="Activity" />
            <${ActivityFeed} sessions=${sessions} activity=${activity} />
          </div>
        </div>
      </div>
    </div>
  `;
}

// ─── Mount ───
createRoot(document.getElementById('root')).render(h`<${App} />`);
  </script>
</body>
</html>
